name: Publish to crates.io

# Trigger ONLY when a version tag is pushed
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Optional: If you created a GitHub Environment for manual approval
    # environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Login (Alternative to passing token in publish command)
        # This configures cargo to use the token for the crates.io registry
        run: cargo login ${CARGO_AUTH_TOKEN}
        env:
          CARGO_AUTH_TOKEN: ${{ secrets.CARGO_AUTH_TOKEN }}

      - name: Publish to crates.io
        run: cargo publish --verbose
